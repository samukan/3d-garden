<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Skill Garden is a browser-saved 3D world builder with a main menu, editor, and read-only saved-world viewer."
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2321282f'/><path d='M30 70 L50 40 L70 70 M50 40 L50 25' stroke='%2367c23c' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='50' cy='20' r='5' fill='%2367c23c'/></svg>" />
    <title>Skill Garden</title>
  </head>
  <body>
    <div id="app">
      <canvas id="renderCanvas" aria-label="Skill Garden 3D world scene"></canvas>

      <div class="ui-shell">
        <header class="top-bar">
          <div class="brand-card">
            <p id="app-eyebrow" class="eyebrow">Main Menu</p>
            <h1 id="app-title">Skill Garden</h1>
            <p id="app-copy" class="brand-copy">
              Open a browser-saved world in read-only mode, or build a new one when you want to create something fresh.
            </p>
          </div>

          <div class="controls-cluster">
            <div id="app-nav-actions" class="app-nav-actions" hidden>
              <a id="app-edit-link" class="ui-button menu-secondary-button app-nav-link" href="#">Edit World</a>
              <a id="app-menu-link" class="ui-button menu-secondary-button app-nav-link" href="#">Back To Menu</a>
            </div>
            <button id="builder-info-toggle" class="ui-button menu-secondary-button builder-info-toggle" type="button" aria-label="Toggle builder info" aria-expanded="false" hidden>?</button>
            <div id="status-badge" class="status-badge" aria-live="polite"></div>
          </div>
        </header>

        <main id="menu-panel" class="menu-panel" hidden aria-live="polite"></main>

        <div id="builder-workspace" class="builder-workspace" hidden>
          <div id="builder-top-bar" class="builder-top-bar" aria-label="Builder actions"></div>
          <div id="builder-toast-host" class="builder-toast-host" aria-live="polite"></div>
          <aside id="builder-library-panel" class="builder-shell-panel builder-library-panel" aria-live="polite"></aside>
          <div id="builder-resize-handle" class="builder-resize-handle" aria-hidden="true"></div>
          <div class="builder-center-spacer" aria-hidden="true"></div>
          <aside id="builder-inspector-panel" class="builder-shell-panel builder-inspector-panel" aria-live="polite"></aside>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
